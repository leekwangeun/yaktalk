# Render Blueprint — 저장소 연결 시 자동 인식
services:
  - type: web
    name: yaktalk-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --app-dir src --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # 무료 티어(512MB)에서 메모리 부족 시 "1"로 → 사전+규칙만으로 동작 (판정 기능은 동일)
      - key: DISABLE_NLU
        value: "0"
